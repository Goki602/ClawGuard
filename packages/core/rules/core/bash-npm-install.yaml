- id: BASH.NPM_INSTALL
  match:
    tool: bash
    command_regex: '(?:^|\s|;|&&|\|\|)npm\s+(?:install|i|add)\s+\S'
  risk: medium
  explain:
    title: "npm追加"
    what: "新しいnpmパッケージをインストールしようとしています。"
    why:
      - "悪意あるパッケージがインストール時にスクリプトを実行する可能性があります。"
      - "typosquatting（名前の似た偽パッケージ）の可能性があります。"
    check:
      - "パッケージ名のスペルは正しい？"
      - "このパッケージは信頼できる？（ダウンロード数・メンテナ）"
    alternatives:
      - "`npm info <pkg>` で先にパッケージ情報を確認する"
      - "npmjs.com でパッケージの信頼性を確認する"
  meta:
    author: "clawguard"
    pack: "core"
    version: "1.0.0"
    tags: ["package", "supply-chain"]
    phase: 1
    marketplace:
      status: "active"
      downloads: 0
      rating: 0.0
      override_rate: 0.0
