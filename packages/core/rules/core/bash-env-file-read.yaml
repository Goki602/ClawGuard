- id: BASH.ENV_FILE_READ
  match:
    tool: bash
    command_regex: '(?:^|\s|;|&&|\|\|)cat\s+.*\.env(?:\.\w+)?(?:\s|$)'
  risk: medium
  explain:
    title: "環境変数の読み取り"
    what: ".envファイル（パスワードやAPIキーが入っていることが多いファイル）を表示しようとしています。"
    why:
      - "APIキーやパスワードが画面やログに表示される可能性があります。"
      - "表示された情報がチャット履歴に残る可能性があります。"
    check:
      - ".envファイルにAPIキーやパスワードは入っている？"
      - "特定の変数だけ確認すれば足りない？"
    alternatives:
      - "`grep KEY_NAME .env` で特定の変数だけ確認する"
      - "`cat .env.example` でテンプレートを確認する"
  meta:
    author: "clawguard"
    pack: "core"
    version: "1.0.0"
    tags: ["secret", "credential"]
    phase: 1
    marketplace:
      status: "active"
      downloads: 0
      rating: 0.0
      override_rate: 0.0
