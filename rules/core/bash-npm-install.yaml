- id: BASH.NPM_INSTALL
  match:
    tool: bash
    command_regex: '(?:^|\s|;|&&|\|\|)npm\s+(?:install|i|add)\s+(?!-)[^\s-]'
  risk: medium
  explain:
    title: "npm追加"
    what: "新しいnpmパッケージをインストールしようとしています。"
    why:
      - "悪意あるパッケージがインストール時にスクリプトを実行する可能性があります。"
      - "typosquatting（名前の似た偽パッケージ）の可能性があります。"
    check:
      - "パッケージ名のスペルは正しい？"
      - "このパッケージは信頼できる？（ダウンロード数・メンテナ）"
    alternatives:
      - "`npm info <pkg>` で先にパッケージ情報を確認する"
      - "`npm install --ignore-scripts <pkg>` でスクリプト実行なしにインストールする"
    simple:
      doing: "新しいパッケージ（追加機能）をインストールしようとしています"
      safe_points: ["有名なパッケージなら通常は安全です"]
      warning_points: ["偽パッケージに注意が必要です"]
      one_check: "パッケージ名は正しい？"
  meta:
    author: "clawguard"
    pack: "core"
    version: "1.0.0"
    tags: ["package", "supply-chain"]
    phase: 1
