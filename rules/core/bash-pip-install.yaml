- id: BASH.PIP_INSTALL
  match:
    tool: bash
    command_regex: '(?:^|\s|;|&&|\|\|)pip3?\s+install\s+(?!-r\b|-e\b|--)[^\s-]'
  risk: medium
  explain:
    title: "pip追加"
    what: "新しいPythonパッケージをインストールしようとしています。"
    why:
      - "悪意あるパッケージがインストール時にコードを実行する可能性があります。"
      - "typosquatting（名前の似た偽パッケージ）の可能性があります。"
    check:
      - "パッケージ名のスペルは正しい？"
      - "このパッケージは信頼できる？（PyPIでの情報を確認）"
    alternatives:
      - "`pip show <pkg>` で先にパッケージ情報を確認する"
      - "`pip install --no-deps <pkg>` で依存関係なしにインストールする"
    simple:
      doing: "新しいPythonパッケージをインストールしようとしています"
      safe_points: ["有名なパッケージなら通常は安全です"]
      warning_points: ["偽パッケージに注意が必要です"]
      one_check: "パッケージ名は正しい？"
  meta:
    author: "clawguard"
    pack: "core"
    version: "1.0.0"
    tags: ["package", "supply-chain"]
    phase: 1
