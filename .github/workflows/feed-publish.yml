name: Publish Feed

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1" # Weekly: Monday 02:00 UTC

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Build feed artifacts
        run: npx tsx scripts/build-feed.ts --output-dir dist/feed

      - name: Delete existing feed-latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete feed-latest --yes --cleanup-tag 2>/dev/null || true

      - name: Publish feed-latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: feed-latest
          name: "Feed (latest)"
          files: |
            dist/feed/manifest.json
            dist/feed/rules.json
            dist/feed/reputation.json
          prerelease: true
